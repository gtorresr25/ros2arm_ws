#nebula-unittest
test-ubuntu-20.04-x86_64-ros2-nebula-galactic:
  image: 192.168.104.3:32768/ubuntu_ros20.04_galactic:v1
  stage: unittest
  needs: ["build-ubuntu20.04-x86_64-ros2-galactic-nebula"]
  script:
    - tar -zxvf nebula-ros-driver-*.tar.gz
    - rm -rf nebula-ros-driver-*.tar.gz
    - cd nebula-ros-driver*
    - dpkg-deb -x ros*.deb .
    - cp -r ./opt/ros/galactic/lib/* /opt/ros/galactic/lib/
    - cp -r ./opt/ros/galactic/share/* /opt/ros/galactic/share/
    - source /opt/ros/galactic/setup.bash
    - apt update && apt install -y tmux
    - tmux new-session -d -s my_session 'ros2 launch deptrum-ros-driver-nebula nebula_launch.py slam_mode:=0'
    - sleep 10
    - ros2 topic list
    - rm -rf /tmp/image/
    - tmux new-session -d -s my_sub 'ros2 launch deptrum-ros-driver-nebula sub_node_ci_nebula_launch.py'
    - sleep 10
    - tmux send-keys -t my_sub:0.0 C-c
    - sleep 2
    - tmux send-keys -t my_session:0.0 C-c
    - sleep 2
    - cat /tmp/deptrum_ros_driver*
    - cp -r /tmp/image ${CI_PROJECT_DIR}
    
  artifacts:
    name:  "$CI_COMMIT_REF_NAME"
    expire_in: 1 week
    paths:
      - image
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
      - version_ros_nebula.h
      when: manual
  tags:
    - linux-x86_64-unittest

