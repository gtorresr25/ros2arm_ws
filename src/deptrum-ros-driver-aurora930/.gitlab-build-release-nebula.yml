build-ubuntu20.04-x86_64-ros2-galactic-nebula:
  image: 192.168.104.3:32768/ubuntu_ros20.04_galactic:v1
  stage: build
  script:
    # nebula
    - MAJOR=`cat version_ros_nebula.h | grep MAJOR | cut -d " " -f 3`
    - MINOR=`cat version_ros_nebula.h | grep MINOR | cut -d " " -f 3`
    - REVISION=`cat version_ros_nebula.h | grep REVISION | cut -d " " -f 3`
    - version=$MAJOR.$MINOR.$REVISION
    - build_deb $version nebula usage_nebula.md RELEASE_NEBULA.md galactic
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
      - version_ros_nebula.h
      when: always
  artifacts:
    name:  "$CI_COMMIT_REF_NAME"
    expire_in: 1 week
    paths:
      - nebula-ros-driver-galactic-*.tar.gz
      - deptrum-ros-driver*.tar.gz
  tags:
    - linux-x86_64

release-ubuntu20.04-x86_64-ros2-galactic-nebula:
  image: 192.168.104.3:32768/ubuntu16.04-x86_64:v1
  stage: release
  needs: ["build-ubuntu20.04-x86_64-ros2-galactic-nebula"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
      - version_ros_nebula.h
      when: manual
  script:
    - curl --upload-file nebula-ros-driver-galactic-*.tar.gz -u $NAS_LOGIN smb://$nas_ip/$release_path/deptrum-ros-driver/release/galactic-x86_64/nebula/
    - curl --upload-file deptrum-ros-driver-nebula*.tar.gz -u $NAS_LOGIN smb://$nas_ip/$release_path/deptrum-ros-driver/release/galactic-x86_64/nebula/source/
  tags:
    - linux-x86_64


