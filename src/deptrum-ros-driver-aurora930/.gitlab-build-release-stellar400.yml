#stellar400-unittest
test-ubuntu-20.04-x86_64-ros2-stellar400-galactic:
  image: 192.168.104.3:32768/ubuntu_ros20.04_galactic:v1
  stage: unittest
  needs: ["build-ubuntu20.04-x86_64-ros2-galactic-stellar400"]
  script:
    - tar -zxvf stellar400-ros-driver-*.tar.gz
    - rm -rf stellar400-ros-driver-*.tar.gz
    - cd stellar400-ros-driver*
    - dpkg-deb -x ros*.deb .
    - cp -r ./opt/ros/galactic/lib/* /opt/ros/galactic/lib/
    - cp -r ./opt/ros/galactic/share/* /opt/ros/galactic/share/
    - source /opt/ros/galactic/setup.bash
    - apt update && apt install -y tmux
    - tmux new-session -d -s my_session 'ros2 launch deptrum-ros-driver-stellar400 stellar400_launch.py'
    - sleep 10
    - ros2 topic list
    - rm -rf /tmp/image/
    - tmux new-session -d -s my_sub 'ros2 launch deptrum-ros-driver-stellar400 sub_node_ci_stellar400_launch.py'
    - sleep 10
    - tmux send-keys -t my_sub:0.0 C-c
    - sleep 2
    - tmux send-keys -t my_session:0.0 C-c
    - sleep 2
    - cat /tmp/deptrum_ros_driver*
    - cp -r /tmp/image ${CI_PROJECT_DIR}
    
  artifacts:
    name:  "$CI_COMMIT_REF_NAME"
    expire_in: 1 week
    paths:
      - image
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
      - version_ros_stellar400.h
      when: manual
  tags:
    - linux-x86_64-unittest

