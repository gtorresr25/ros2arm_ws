build-ubuntu20.04-x86_64-ros2-galactic-stellar400:
  image: 192.168.104.3:32768/ubuntu_ros20.04_galactic:v1
  stage: build
  script:
    # stellar400 and stellar420
    - MAJOR=`cat version_ros_stellar400.h | grep MAJOR | cut -d " " -f 3`
    - MINOR=`cat version_ros_stellar400.h | grep MINOR | cut -d " " -f 3`
    - REVISION=`cat version_ros_stellar400.h | grep REVISION | cut -d " " -f 3`
    - version=$MAJOR.$MINOR.$REVISION
    - build_deb $version stellar400 usage_stellar400.md RELEASE_STELLAR400.md galactic
    - build_deb $version stellar420 usage_stellar420.md RELEASE_STELLAR420.md galactic
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
      - version_ros_stellar400.h
      when: always
  artifacts:
    name:  "$CI_COMMIT_REF_NAME"
    expire_in: 1 week
    paths:
      - stellar400-ros-driver-galactic-*.tar.gz
      - stellar420-ros-driver-galactic-*.tar.gz
      - deptrum-ros-driver*.tar.gz
  tags:
    - linux-x86_64

release-ubuntu20.04-x86_64-ros2-galactic-stellar400:
  image: 192.168.104.3:32768/ubuntu16.04-x86_64:v1
  stage: release
  needs: ["build-ubuntu20.04-x86_64-ros2-galactic-stellar400"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
      - version_ros_stellar400.h
      when: manual
  script:
    - curl --upload-file stellar400-ros-driver-galactic-*.tar.gz -u $NAS_LOGIN smb://$nas_ip/$release_path/deptrum-ros-driver/release/galactic-x86_64/stellar400/
    - curl --upload-file stellar420-ros-driver-galactic-*.tar.gz -u $NAS_LOGIN smb://$nas_ip/$release_path/deptrum-ros-driver/release/galactic-x86_64/stellar420/
    - curl --upload-file deptrum-ros-driver-stellar400*.tar.gz -u $NAS_LOGIN smb://$nas_ip/$release_path/deptrum-ros-driver/release/galactic-x86_64/stellar400/source/
